name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Deployment
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name":"chest-xray-gallery",
              "project":"chest-xray-gallery",
              "gitSource":{
                "type":"github",
                "repo":"ericsopenclaw/chest-xray-gallery",
                "ref":"main",
                "repoId":"1198162785"
              }
            }' | python3 -c "import json,sys; d=json.load(sys.stdin); print('Deploy URL:', d.get('url','error'))"
