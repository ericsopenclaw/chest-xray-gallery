<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>胸部 X 光鑑別診斷｜Chest X-Ray Case Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0e14;
      --bg-secondary: #111820;
      --bg-card: #161d27;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --text-primary: #e8edf4;
      --text-secondary: #8899aa;
      --text-muted: #4a5568;
      --border: #1e2a38;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Noto Sans TC', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,14,20,0.95) 0%, transparent 100%);
    }

    .header-title {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .header-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    /* ── Main Image Area ── */
    .slideshow {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 60px 120px;
      user-select: none;
    }

    .slide {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      animation: fadeIn 0.35s ease;
    }

    .slide.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to   { opacity: 1; transform: scale(1); }
    }

    .image-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-height: calc(100vh - 200px);
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    }

    /* ── Caption ── */
    .caption {
      margin-top: 24px;
      text-align: center;
      padding-bottom: 8px;
    }

    .caption-disease {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .caption-english {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .caption-index {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.15em;
    }

    /* ── Navigation Arrows ── */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 1.2rem;
    }

    .nav-arrow:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .nav-arrow.prev { left: 20px; }
    .nav-arrow.next { right: 20px; }

    /* ── Dots ── */
    .dots {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
    }

    .dot:hover {
      background: var(--text-secondary);
      transform: scale(1.3);
    }

    .dot.active {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      transform: scale(1.25);
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      text-align: center;
      padding: 12px 20px;
      background: linear-gradient(to top, rgba(10,14,20,0.9) 0%, transparent 100%);
      font-size: 0.65rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }

    /* ── Keyboard hint ── */
    .keyboard-hint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .slideshow { padding: 70px 16px 110px; }
      .nav-arrow { width: 38px; height: 38px; font-size: 1rem; }
      .nav-arrow.prev { left: 10px; }
      .nav-arrow.next { right: 10px; }
      .caption-disease { font-size: 1.1rem; }
      .keyboard-hint { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <span class="header-title">Chest X-Ray Differential Diagnosis</span>
    <span class="header-counter" id="counter">01 / 06</span>
  </header>

  <main class="slideshow" id="slideshow">

    <!-- Slide 1 -->
    <div class="slide active" data-index="0">
      <div class="image-container">
        <img src="01-pneumothorax.jpg" alt="Pneumothorax" loading="eager">
      </div>
      <div class="caption">
        <div class="caption-disease">氣胸</div>
        <div class="caption-english">Pneumothorax</div>
        <div class="caption-index">Case 01</div>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide" data-index="1">
      <div class="image-container">
        <img src="02-bronchopneumonia.png" alt="Bronchopneumonia">
      </div>
      <div class="caption">
        <div class="caption-disease">支氣管肺炎</div>
        <div class="caption-english">Bronchopneumonia</div>
        <div class="caption-index">Case 02</div>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide" data-index="2">
      <div class="image-container">
        <img src="03-pneumoperitoneum.jpg" alt="Pneumoperitoneum">
      </div>
      <div class="caption">
        <div class="caption-disease">腹腔積氣</div>
        <div class="caption-english">Pneumoperitoneum</div>
        <div class="caption-index">Case 03</div>
      </div>
    </div>

    <!-- Slide 4 -->
    <div class="slide" data-index="3">
      <div class="image-container">
        <img src="04-rib-fracture.jpg" alt="Rib Fracture">
      </div>
      <div class="caption">
        <div class="caption-disease">肋骨骨折</div>
        <div class="caption-english">Rib Fracture</div>
        <div class="caption-index">Case 04</div>
      </div>
    </div>

    <!-- Slide 5 -->
    <div class="slide" data-index="4">
      <div class="image-container">
        <img src="05-pleural-effusion.jpg" alt="Massive Pleural Effusion">
      </div>
      <div class="caption">
        <div class="caption-disease">大量肋膜積液</div>
        <div class="caption-english">Massive Pleural Effusion</div>
        <div class="caption-index">Case 05</div>
      </div>
    </div>

    <!-- Slide 6 -->
    <div class="slide" data-index="5">
      <div class="image-container">
        <img src="06-pericardial-effusion.png" alt="Pericardial Effusion">
      </div>
      <div class="caption">
        <div class="caption-disease">心包膜積液</div>
        <div class="caption-english">Pericardial Effusion</div>
        <div class="caption-index">Case 06</div>
      </div>
    </div>

  </main>

  <button class="nav-arrow prev" id="prevBtn" aria-label="上一張">&#8249;</button>
  <button class="nav-arrow next" id="nextBtn" aria-label="下一張">&#8250;</button>

  <div class="keyboard-hint">← → 鍵盤切換</div>

  <div class="dots" id="dots"></div>

  <footer>
    所有影像版權為 Creative Commons 授權，來自
    <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a>。
    僅供醫學教育用途。
  </footer>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dots');
    const counter = document.getElementById('counter');
    let current = 0;

    // Build dots
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `移到第 ${i+1} 張`);
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(index) {
      slides[current].classList.remove('active');
      dotsContainer.children[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      dotsContainer.children[current].classList.add('active');
      counter.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
    }

    document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
    });

    document.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) goTo(current + 1);
      else goTo(current - 1);
    }, { passive: true });
  </script>

</body>
</html>
